services:
  database:
    image: postgres:15
    container_name: go-shortener-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: go-shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - go-shortener

  redis:
    image: redis:7
    container_name: go-shortener-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - go-shortener

volumes:
  postgres_data:
  redis_data:


networks:
  go-shortener:
    driver: bridge
